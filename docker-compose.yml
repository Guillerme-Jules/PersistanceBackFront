x-app-env: &app-env
  APP_ENV: dev
  DATABASE_URL: "postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8"
  AUDIT_DATABASE_URL: "postgresql://app:app@database:5432/audit?serverVersion=16&charset=utf8"
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DB: solarwind
  CLICKHOUSE_USER: app
  CLICKHOUSE_PASSWORD: app
  MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
  MERCURE_URL: "http://mercure/.well-known/mercure"
  MERCURE_PUBLIC_URL: "http://localhost:3080/.well-known/mercure"
  MERCURE_JWT_SECRET: "!ChangeThisMercureHubJWTSecretKey!"
  CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$$"

services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Scripts d'init exécutés une seule fois (création de la base "audit")
      - ./Persistance/docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: solarwind
      CLICKHOUSE_USER: app
      CLICKHOUSE_PASSWORD: app
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse:rw
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://127.0.0.1:8000 http://localhost:5173 http://127.0.0.1:5173
        anonymous
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    ports:
      - "3080:80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
      
  php:
    build:
      context: ./Persistance
      dockerfile: Dockerfile.dev
    command:
      - sh
      - -c
      - |
        ([ -f vendor/autoload_runtime.php ] || composer install --no-interaction) &&
        php bin/console lexik:jwt:generate-keypair --skip-if-exists --no-interaction &&
        php bin/console doctrine:database:create --if-not-exists --no-interaction &&
        php bin/console doctrine:database:create --connection=audit --if-not-exists --no-interaction &&
        php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration &&
        php bin/console doctrine:schema:update --em=audit --force --no-interaction &&
        exec frankenphp run --config /etc/caddy/Caddyfile
    environment:
      <<: *app-env
      SERVER_NAME: ":80"
    ports:
      - "8000:80"
    volumes:
      - ./Persistance:/app
      - php_var:/app/var
    depends_on:
      database:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mercure:
        condition: service_started
        
  worker:
    build:
      context: ./Persistance
      dockerfile: Dockerfile.dev
    command:
      - sh
      - -c
      - |
        until [ -f vendor/autoload_runtime.php ]; do sleep 2; done &&
        exec php bin/console messenger:consume async -vv --time-limit=3600
    restart: unless-stopped
    healthcheck:
      disable: true
    environment:
      <<: *app-env
    volumes:
      - ./Persistance:/app
      - php_var:/app/var
    depends_on:
      database:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      php:
        condition: service_started

  data-init:
    build:
      context: ./Persistance
      dockerfile: Dockerfile.dev
    command:
      - sh
      - -c
      - |
        until [ -f vendor/autoload_runtime.php ]; do sleep 2; done &&
        php bin/console app:solarwind:import "$$SOLARWIND_DATA_SOURCE" --if-empty
    restart: "no"
    healthcheck:
      disable: true
    environment:
      <<: *app-env
      SOLARWIND_DATA_SOURCE: "/import/solarwinds-dscovr-compiled.zip"
    volumes:
      - ./Persistance:/app
      - ./import:/import:ro
      - php_var:/app/var
    depends_on:
      clickhouse:
        condition: service_healthy
      php:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: "http://localhost:8000"
    ports:
      - "5173:5173"
    volumes:
      - ./Persistance-Front:/app
      - /app/node_modules
    depends_on:
      - php

volumes:
  db_data:
  clickhouse_data:
  mercure_data:
  mercure_config:
  php_var: